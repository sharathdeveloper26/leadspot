<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Meta Authentication</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafc; margin: 0; padding: 20px;}
        .container { text-align: center; background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); border: 1px solid #e2e8f0; max-width: 400px; width: 100%; box-sizing: border-box;}
        .shield-icon { width: 48px; height: 48px; background: #e0e7ff; color: #4f46e5; border-radius: 16px; display: flex; items: center; justify-content: center; margin: 0 auto 20px auto; }
        h3 { color: #0f172a; margin-top: 0; margin-bottom: 12px; font-size: 20px; font-weight: 800;}
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; line-height: 1.5; font-weight: 500;}
        button { background-color: #1877F2; color: white; border: none; padding: 14px 24px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: all 0.2s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(24, 119, 242, 0.2); }
        button:hover:not(:disabled) { background-color: #166FE5; transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(24, 119, 242, 0.3); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; box-shadow: none; color: #f8fafc;}
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield-icon">
            <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        </div>
        <h3>Secure Meta Connection</h3>
        <p>You are securely connecting your Meta account to Leadspot Solutions verified infrastructure.</p>
        <button id="fb-login-btn" disabled>
            <div class="spinner" id="btn-spinner"></div>
            <span id="btn-text">Initializing SDK...</span>
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const authType = urlParams.get('type');
        const loginBtn = document.getElementById('fb-login-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');

        window.fbAsyncInit = function() {
            // ✨ Replace with your Leadspot App ID
            FB.init({ appId: '2060924228162885', cookie: true, xfbml: true, version: 'v20.0' });
            
            // Enable the button now that the SDK is ready
            loginBtn.disabled = false;
            btnSpinner.style.display = 'none';
            btnText.innerText = authType === 'whatsapp' ? 'Connect WhatsApp' : 'Continue to Facebook';

            // Wait for user to explicitly click!
            loginBtn.onclick = function() {
                loginBtn.disabled = true;
                btnSpinner.style.display = 'inline-block';
                btnText.innerText = 'Connecting...';

                if (authType === 'whatsapp') {
                    FB.login(function(response) {
                        if (response.authResponse) {
                            const tokenOrCode = response.authResponse.accessToken || response.authResponse.code;
                            window.opener.postMessage({ type: 'META_AUTH_SUCCESS', token: tokenOrCode }, '*');
                        }
                        // Give it a tiny delay to ensure the message fires before window closes
                        setTimeout(() => window.close(), 300);
                    }, { 
                        config_id: '1083197781534526', // Your WA Config ID
                        response_type: 'code',
                        override_default_response_type: true,
                        extras: { setup: {}, featureType: '', sessionInfoVersion: '2' }
                    });
                } else {
                    FB.login(function(response) {
                        if (response.authResponse) {
                            window.opener.postMessage({ type: 'META_AUTH_SUCCESS', token: response.authResponse.accessToken }, '*');
                        } else {
                            // User clicked cancel on the Meta popup
                            loginBtn.disabled = false;
                            btnSpinner.style.display = 'none';
                            btnText.innerText = 'Try Again';
                            return;
                        }
                        setTimeout(() => window.close(), 300);
                    }, { 
                        scope: 'pages_show_list,pages_manage_metadata,leads_retrieval,business_management', 
                        auth_type: 'reauthenticate',
                        return_scopes: true 
                    });
                }
            };
        };

        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));
    </script>
</body>
</html>
